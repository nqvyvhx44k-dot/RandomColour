<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>病毒</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body id="bg" class="h-screen w-screen flex items-center justify-center transition-colors duration-300 ease-in-out bg-[#FFCC00]">
  
  <button
    onclick="changeColor()"
    class="px-10 py-5 bg-white/95 hover:bg-white text-gray-800 font-bold rounded-full shadow-xl text-2xl tracking-wide active:scale-90 transition-all cursor-pointer select-none"
  >
    換個顏色
  </button>

  <script>
    // 專屬的鮮明色彩與中性色調
    const colors = [
      '#FF3333', // 鮮豔紅
      '#FF9500', // 亮橘色
      '#FFCC00', // 陽光黃
      '#34C759', // 鮮明綠
      '#007AFF', // 純粹正藍
      '#FF82AB', // 柔和粉紅色
      '#111111', // 質感黑
      '#FAFAFA', // 乾淨白
      '#9E9E9E', // 沉穩灰
      '#795548', // 溫暖咖啡色
      '#9C27B0'  // 正紫色
    ];
    let currentColor = '#FFCC00';

    function changeColor() {
      let newColor;
      do {
        newColor = colors[Math.floor(Math.random() * colors.length)];
      } while (newColor === currentColor);
      
      currentColor = newColor;
      document.getElementById('bg').style.backgroundColor = currentColor;
    }
  </script>
</body>
</html>
